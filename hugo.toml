# 基础配置（FixIt / DoIt 通用）
baseURL = "https://101.200.235.216:2121"  # 替换为你的博客地址（部署后生效）
languageCode = "zh-CN"                   # 中文支持
defaultContentLanguage = "zh-cn"         # DoIt 额外需要，FixIt 可省略
title = "赛博工匠"                     # 博客标题
theme = "FixIt"                          # 启用 FixIt 主题，DoIt 替换为 "DoIt"
enableRobotsTXT = true                   # 允许搜索引擎抓取
hasCJKLanguage = true                    # 启用中日韩文字支持（中文必开）
enableGitInfo = false
[pagination]
pagerSize = 15                          # 每页文章数


# ==================== 【1. 新增搜索配置：指定输出格式】 ====================
# 指导 Hugo 在编译时生成 index.json 文件，这是搜索功能的数据源
#[outputs]
#  home = ["HTML", "RSS", "JSON"]
# =========================================================================

# 语法高亮（科技博客必配，适配代码显示）
[markup]
  [markup.highlight]
    noClasses = false                     # 必须设为 false，否则代码高亮异常
    codeFences = true
    guessSyntax = true
    lineNos = true                       # 显示代码行号
    lineNumbersInTable = true

  [markup.goldmark.extensions]
    [markup.goldmark.extensions.passthrough]
      enable = true
      [markup.goldmark.extensions.passthrough.delimiters]
        block = [['\[', '\]'], ['$$', '$$']]
        inline = [['\(', '\)'], ['$', '$']]

