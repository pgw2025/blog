# 主题核心参数（FixIt / DoIt 通用，适配科技博客）
[params]
  # 基础信息 —— 已修复为 map 格式，解决报错
  [params.author]
    name = "GW"
    url = ""
    email = ""
  
  description = "分享编程技术、Linux 运维、开发笔记的个人博客"  # 博客描述（SEO 用）
  defaultTheme = "auto"                    # 自动切换深色/浅色模式
  enableToTop = true                       # 回到顶部按钮
  enableSearch = true                      # 开启搜索功能（科技博客必备）
  enableLightGallery = true                # 图片灯箱预览（插入技术截图方便）
  rssLimit = 20

  # ==================== 【2. 新增搜索配置：Lunr 搜索引擎参数】 ====================
  # 本地 Lunr 搜索，开箱即用，无需配置云端 API 
  [params.search]
    enable = false

  # =========================================================================

  # 首页配置（优化科技博客展示）
  [params.home]
    subtitle = "记录每一次成长，分享每一点技术。"  # 首页副标题
    postListMode = "detailed"             # 文章卡片显示摘要+封面（推荐）
    enableFeatured = true                 # 显示置顶文章
  [params.home.profile]
    enable = true
    onlyFirstPage=true
    avatarURL = "/images/avatar.png"
    location = "China"
    organization = "Cyber Craftsman"

  # 文章页配置（提升阅读体验）
  [params.page]
    cover = true  # 确保开启封面显示（默认true，若为false则改为true）
    [params.page.toc]
      enable = true                       # 显示文章目录（长教程必备）
      keepStatic = false
      auto = true
    [params.page.code]
      copy = true                         # 代码块复制按钮（科技博客必开）
      maxShownLines = 20                  # 代码块默认显示行数

  # 个人信息（可选，显示在首页）
  [params.profile]
    avatar = "/images/avatar.png"         # 头像（放入 static/images/ 目录）
    bio = "程序员 / 运维工程师 / 终身学习者"
    [params.profile.social]
      GitHub = "你的GitHubID"             # 科技博主常用社交账号
      Email = "你的邮箱"
      Bilibili = "你的B站ID"