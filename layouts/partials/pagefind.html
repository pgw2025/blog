<link rel="stylesheet" href="/pagefind/pagefind-ui.css">

<div id="pagefind-search" style="display:none;"></div>

<script src="/pagefind/pagefind-ui.js"></script>

<style>
    /* 1. Pagefind UI 基础变量（浅色模式） */
    :root {
        --pagefind-ui-primary: #2563eb;
        /* 链接与高亮颜色 */
        --pagefind-ui-text: var(--text-main, #333333);
        /* 适配主题的主文本色，fallback为#333 */
        --pagefind-ui-background: var(--card-background, #ffffff);
        /* 适配主题的卡片背景色 */
        --pagefind-ui-border: var(--border-color, #e5e7eb);
        /* 边框颜色 */
        --pagefind-ui-tag: var(--background, #f3f4f6);
        /* 标签/小背景色 */
    }

    /* 2. Pagefind UI 深色模式变量 */
    /* 兼容大多数 Hugo 主题的深色模式选择器（如 html[theme="dark"], .dark 等） */
    html[theme="dark"],
    html[data-theme="dark"],
    html.dark,
    body.dark {
        --pagefind-ui-primary: #60a5fa;
        --pagefind-ui-text: var(--text-main, #f3f4f6);
        --pagefind-ui-background: var(--card-background, #1f2937);
        --pagefind-ui-border: var(--border-color, #374151);
        --pagefind-ui-tag: var(--background, #111827);
    }

    /* 3. 模态框及容器样式 */
    #pagefind-modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        display: none;
        z-index: 99999;
        /* 背景模糊效果（可选） */
        backdrop-filter: blur(4px);
    }

    #pagefind-modal.active {
        display: block;
    }

    #pagefind-box {
        position: absolute;
        top: 10%;
        left: 50%;
        transform: translateX(-50%);
        width: min(800px, 90%);
        background: var(--pagefind-ui-background);
        /* 自动跟随 Pagefind 背景变量 */
        border: 1px solid var(--pagefind-ui-border);
        /* 自动跟随 Pagefind 边框变量 */
        border-radius: 12px;
        padding: 18px;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
    }
</style>

<div id="pagefind-modal">
    <div id="pagefind-box">
        <div id="search"></div>
    </div>
</div>

<script>
    let pagefindUI;

    function openSearch() {
        document.getElementById("pagefind-modal").classList.add("active");

        if (!pagefindUI) {
            pagefindUI = new PagefindUI({
                element: "#search",
                showImages: true,
                showSubResults: true,
                excerptLength: 30
            });
        }
        // 打开后自动聚焦到输入框
        setTimeout(() => {
            const input = document.querySelector("#search input");
            if (input) input.focus();
        }, 100);
    }

    function closeSearch() {
        document.getElementById("pagefind-modal").classList.remove("active");
    }

    // 点击遮罩层空白处关闭
    document.getElementById("pagefind-modal").addEventListener("click", function (e) {
        if (e.target === this) {
            closeSearch();
        }
    });

    document.addEventListener("keydown", function (e) {
        // ESC 关闭
        if (e.key === "Escape") {
            closeSearch();
        }

        // "/" 快捷键打开
        if (e.key === "/" && !e.ctrlKey && !e.metaKey) {
            const activeEl = document.activeElement;
            // 避免在输入框中打字时触发
            if (activeEl.tagName !== "INPUT" && activeEl.tagName !== "TEXTAREA") {
                e.preventDefault();
                openSearch();
            }
        }

        // Ctrl + K
        if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "k") {
            e.preventDefault();
            openSearch();
        }
    });
</script>
